appId: com.cherryai.cherrystudio
productName: Cherry Studio
electronLanguages:
  - zh-CN
  - zh-TW
  - en-US
  - ja # macOS/linux/win
  - ru # macOS/linux/win
  - zh_CN # for macOS
  - zh_TW # for macOS
  - en # for macOS
  - de
directories:
  buildResources: build

protocols:
  - name: Cherry Studio
    schemes:
      - cherrystudio
files:
  - "**/*"
  - "!**/{.vscode,.yarn,.yarn-lock,.github,.cursorrules,.prettierrc}"
  - "!electron.vite.config.{js,ts,mjs,cjs}}"
  - "!.*"
  - "!components.json"
  - "!**/{.eslintignore,.eslintrc.js,.eslintrc.json,.eslintcache,root.eslint.config.js,eslint.config.js,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,eslint.config.mjs,dev-app-update.yml,CHANGELOG.md,README.md,biome.jsonc}"
  - "!**/{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!**/{tsconfig.json,tsconfig.tsbuildinfo,tsconfig.node.json,tsconfig.web.json}"
  - "!**/{.editorconfig,.jekyll-metadata}"
  - "!src"
  - "!config"
  - "!patches"
  - "!app-upgrade-config.json"
  - "!**/node_modules/**/*.cpp"
  - "!**/node_modules/node-addon-api/**"
  - "!**/node_modules/prebuild-install/**"
  - "!scripts"
  - "!local"
  - "!docs"
  - "!packages"
  - "!.swc"
  - "!.bin"
  - "!._*"
  - "!*.log"
  - "!stats.html"
  - "!*.md"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/*.{map,ts,tsx,jsx,less,scss,sass,css.d.ts,d.cts,d.mts,md,markdown,yaml,yml}"
  - "!**/{test,tests,__tests__,powered-test,coverage}/**"
  - "!**/{example,examples}/**"
  - "!**/*.{spec,test}.{js,jsx,ts,tsx}"
  - "!**/*.min.*.map"
  - "!**/*.d.ts"
  - "!**/dist/es6/**"
  - "!**/dist/demo/**"
  - "!**/amd/**"
  - "!**/{.DS_Store,Thumbs.db,thumbs.db,__pycache__}"
  - "!**/{LICENSE,license,LICENSE.*,*.LICENSE.txt,NOTICE.txt,README.md,readme.md,CHANGELOG.md}"
  - "!node_modules/rollup-plugin-visualizer"
  - "!node_modules/js-tiktoken"
  - "!node_modules/@tavily/core/node_modules/js-tiktoken"
  - "!node_modules/pdf-parse/lib/pdf.js/{v1.9.426,v1.10.88,v2.0.550}"
  - "!node_modules/mammoth/{mammoth.browser.js,mammoth.browser.min.js}"
  - "!node_modules/selection-hook/prebuilds/**/*" # we rebuild .node, don't use prebuilds
  - "!node_modules/selection-hook/node_modules" # we don't need what in the node_modules dir
  - "!node_modules/selection-hook/src" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core.js,tesseract-core.wasm,tesseract-core.wasm.js}" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core-lstm.js,tesseract-core-lstm.wasm,tesseract-core-lstm.wasm.js}" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core-simd-lstm.js,tesseract-core-simd-lstm.wasm,tesseract-core-simd-lstm.wasm.js}" # we don't need source files
  - "!**/*.{h,iobj,ipdb,tlog,recipe,vcxproj,vcxproj.filters,Makefile,*.Makefile}" # filter .node build files
  - "resources/**/*" # include all files in resources, and unpack them from asar for runtime access
asarUnpack:
  - resources/**
  - "**/*.{metal,exp,lib}"
  - "node_modules/@img/sharp-*/**"
  - "node_modules/@anthropic-ai/claude-agent-sdk-*/**" # native CLI binary must live on disk to be spawned
extraResources:
  - from: "migrations/sqlite-drizzle"
    to: "migrations/sqlite-drizzle"
  - from: "packages/provider-registry/data"
    to: "provider-registry"
win:
  executableName: CherryStudio
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
    - target: portable
  signtoolOptions:
    sign: scripts/win-sign.js
  verifyUpdateCodeSignature: false
nsis:
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: true
  oneClick: false
  include: build/nsis-installer.nsh
  buildUniversalInstaller: false
  differentialPackage: false
portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}
  buildUniversalInstaller: false
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  artifactName: ${productName}-${version}-${arch}.${ext}
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  target:
    - target: dmg
    - target: zip
dmg:
  writeUpdateInfo: false
linux:
  artifactName: ${productName}-${version}-${arch}.${ext}
  executableName: CherryStudio
  target:
    - target: AppImage
    - target: deb
    - target: rpm
  maintainer: electronjs.org
  category: Utility
  desktop:
    entry:
      Name: Cherry Studio
      StartupWMClass: CherryStudio
  mimeTypes:
    - x-scheme-handler/cherrystudio
rpm:
  # Workaround for electron build issue on rpm package:
  # https://github.com/electron/forge/issues/3594
  fpm: ["--rpm-rpmbuild-define=_build_id_links none"]
publish:
  provider: generic
  url: https://releases.cherry-ai.com
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
beforePack: scripts/before-pack.js
afterPack: scripts/after-pack.js
afterSign: scripts/notarize.js
artifactBuildCompleted: scripts/artifact-build-completed.js
releaseInfo:
  releaseNotes: |
    <!--LANG:en-->
    Cherry Studio 2.0.0 - Major Architecture Upgrade

    ✨ New Features
    - [Migration] Redesigned V2 migration window with clearer progress and error handling
    - [Settings] Added ability to delete provider models directly from settings
    - [Knowledge] Added custom chunk strategy and separator options for better content processing
    - [Knowledge] Added recovery for knowledge bases that lost embedding models during migration
    - [Knowledge] Added pagination for data source items in knowledge base settings
    - [Knowledge] Added conflict dialog when adding duplicate data sources
    - [Power] Added option to prevent system sleep during long-running tasks
    - [Providers] Added proxy support for provider HTTP requests
    - [UI] Added required field indicators and improved form validation
    - [Search] Restored global search panel
    - [Chat] Restored chat history records page

    🐛 Bug Fixes
    - [Chat] Fixed message list scrolling behavior (pin-to-top and bottom-follow)
    - [Settings] Fixed language selector not matching active UI language on startup
    - [Painting] Fixed auto dimension selection for image generation
    - [Knowledge] Fixed interrupted indexing items getting stranded
    - [OCR] Fixed image OCR routing through file processing
    - [UI] Fixed side panel display issues on non-Mac platforms
    - [Agents] Fixed MCP tools blocking agent/chat startup
    - [Migration] Fixed knowledge base migration issues on Windows
    - [Navigation] Fixed Launchpad page 404 error
    - [Knowledge] Fixed relative time display at unit boundaries

    ⚡ Performance
    - [Startup] Improved startup speed by deferring binary manager initialization

    <!--LANG:zh-CN-->
    Cherry Studio 2.0.0 - 架构重大升级

    ✨ 新功能
    - [迁移] 重设计 V2 迁移窗口，进度和错误处理更清晰
    - [设置] 支持直接从设置中删除提供商模型
    - [知识库] 支持自定义分块策略和分隔符选项，优化内容处理
    - [知识库] 支持恢复迁移过程中丢失嵌入模型的知识库
    - [知识库] 知识库设置中的数据源项目支持分页显示
    - [知识库] 添加重复数据源时显示冲突提示
    - [电源] 支持长时间运行任务时防止系统休眠
    - [提供商] 支持代理配置用于提供商 HTTP 请求
    - [界面] 添加必填字段标识并改进表单验证
    - [搜索] 恢复全局搜索面板
    - [聊天] 恢复聊天历史记录页面

    🐛 问题修复
    - [聊天] 修复消息列表滚动行为（置顶和底部跟随）
    - [设置] 修复启动时语言选择器与界面语言不匹配
    - [绘图] 修复图像生成的自动尺寸选择
    - [知识库] 修复中断的索引项目被遗留的问题
    - [OCR] 修复图像 OCR 通过文件处理的路由
    - [界面] 修复非 Mac 平台的侧边栏显示问题
    - [智能体] 修复 MCP 工具阻塞智能体/聊天启动
    - [迁移] 修复 Windows 上的知识库迁移问题
    - [导航] 修复启动页 404 错误
    - [知识库] 修复相对时间在单位边界处的显示

    ⚡ 性能优化
    - [启动] 通过延迟二进制管理器初始化提升启动速度
    <!--LANG:END-->
